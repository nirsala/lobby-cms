<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1920"/>
<title>Pixel Lobby Display</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#d71d43;
  --dark:#0d0d0d;
  --panel:#111111;
  --panel2:#161616;
  --border:rgba(255,255,255,0.07);
  --muted:rgba(255,255,255,0.5);
  --text:#ffffff;
}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--dark);color:var(--text);
  font-family:'Heebo','Arial',sans-serif;
  user-select:none;
}

/* ── LAYOUT ─────────────────────────────── */
#display{
  display:flex;flex-direction:column;
  width:100vw;height:100vh;
}
#main-row{
  display:flex;flex:1;overflow:hidden;
}

/* ── LEFT PANEL ─────────────────────────── */
#left-panel{
  width:240px;flex-shrink:0;
  background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  align-items:center;padding:28px 16px;
  gap:24px;position:relative;z-index:2;
}
#left-panel::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,var(--red),transparent);
  opacity:.35;
}
#logo-wrap{
  width:180px;height:90px;
  display:flex;align-items:center;justify-content:center;
}
#logo-img{
  max-width:180px;max-height:90px;object-fit:contain;
}
#logo-default{
  font-size:1.4rem;font-weight:900;color:var(--red);
  text-align:center;letter-spacing:-0.5px;
}
.divider{
  width:80%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(215,29,67,.4),transparent);
}
#clock-block{text-align:center;}
#clock-time{
  font-size:3rem;font-weight:900;letter-spacing:-2px;
  color:var(--text);line-height:1;
  font-variant-numeric:tabular-nums;
}
#clock-seconds{font-size:1.4rem;color:var(--muted);vertical-align:super;}
#clock-day{
  font-size:.85rem;color:var(--muted);margin-top:6px;font-weight:500;
}
#clock-date{
  font-size:1.1rem;font-weight:700;margin-top:4px;color:var(--text);
  direction:ltr;
}
#clock-hebrew{
  font-size:.95rem;color:var(--red);font-weight:600;
  margin-top:8px;line-height:1.4;
}

/* ── CONTENT AREA ────────────────────────── */
#content-area{
  flex:1;display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}

/* ── MEDIA SLIDESHOW ────────────────────── */
#media-area{
  flex:1;position:relative;overflow:hidden;
  background:#000;
}
.media-slide{
  position:absolute;inset:0;
  opacity:0;transition:opacity 1.2s ease-in-out;
  display:flex;align-items:center;justify-content:center;
}
.media-slide.active{opacity:1;}
.media-slide img,.media-slide video{
  width:100%;height:100%;object-fit:cover;
}
#media-empty{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  background:linear-gradient(135deg,#0d0d0d,#1a1a1a);
  color:var(--muted);
}
#media-empty svg{opacity:.3;}
#media-empty p{font-size:1rem;letter-spacing:2px;text-transform:uppercase;}

/* ── MESSAGES OVERLAY ────────────────────── */
#messages-panel{
  position:absolute;
  bottom:0;left:0;
  width:320px;
  height:60%;
  overflow:hidden;
  pointer-events:none;
  mask:linear-gradient(to top,rgba(0,0,0,1) 60%,transparent 100%);
  padding:0 0 12px 0;
}
#messages-track{
  display:flex;flex-direction:column;gap:12px;
  animation:scrollUp linear infinite;
  animation-duration:var(--scroll-dur,30s);
  padding-top:100%;
}
@keyframes scrollUp{
  from{transform:translateY(0)}
  to  {transform:translateY(-50%)}
}
.message-item{
  padding:12px 18px;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px);
  border-right:3px solid var(--red);
  border-radius:0 8px 8px 0;
  font-size:1.1rem;font-weight:600;
  line-height:1.5;
  max-width:300px;
  word-break:break-word;
}

/* ── RSS TICKER ──────────────────────────── */
#ticker-bar{
  height:52px;flex-shrink:0;
  background:rgba(0,0,0,.88);
  border-top:1px solid rgba(215,29,67,.3);
  display:flex;align-items:center;overflow:hidden;
  position:relative;
}
#ticker-label{
  padding:0 18px;
  font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--red);white-space:nowrap;flex-shrink:0;
  border-left:1px solid rgba(215,29,67,.3);
  height:100%;display:flex;align-items:center;
  background:rgba(215,29,67,.06);
  min-width:90px;
}
#ticker-track-wrap{flex:1;overflow:hidden;}
#ticker-track{
  display:inline-flex;gap:80px;white-space:nowrap;
  animation:tickerScroll linear infinite;
  animation-duration:var(--ticker-dur,60s);
}
@keyframes tickerScroll{
  from{transform:translateX(0)}
  to  {transform:translateX(-50%)}
}
.ticker-item{
  font-size:.9rem;color:rgba(255,255,255,.85);
  padding:0 8px;
}
.ticker-dot{
  color:var(--red);margin:0 12px;font-size:1.2rem;vertical-align:middle;
}

/* Responsive for different resolutions */
@media(max-width:1280px){
  #left-panel{width:200px;}
  #clock-time{font-size:2.4rem;}
  #messages-panel{width:260px;}
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

<div id="display">

  <div id="main-row">

    <!-- LEFT PANEL: logo + clock -->
    <div id="left-panel">
      <div id="logo-wrap">
        <img id="logo-img" src="" alt="לוגו" style="display:none"/>
        <div id="logo-default">Pixel<br>Lobby</div>
      </div>

      <div class="divider"></div>

      <div id="clock-block">
        <div id="clock-time">00:00<span id="clock-seconds">:00</span></div>
        <div id="clock-day">טוען...</div>
        <div id="clock-date">--/--/----</div>
      </div>

      <div class="divider"></div>

      <div id="clock-hebrew"></div>
    </div>

    <!-- CONTENT AREA -->
    <div id="content-area">

      <!-- Media slideshow -->
      <div id="media-area">
        <div id="media-empty">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p>ממתין לתכנים...</p>
        </div>
      </div>

      <!-- Scrolling messages overlay -->
      <div id="messages-panel" style="display:none">
        <div id="messages-track"></div>
      </div>

    </div>
  </div>

  <!-- RSS TICKER -->
  <div id="ticker-bar" style="display:none">
    <div id="ticker-label">📰 חדשות</div>
    <div id="ticker-track-wrap">
      <div id="ticker-track"></div>
    </div>
  </div>

</div>

<!-- Hidden audio player for background music -->
<audio id="music-player" loop style="display:none">
  <source id="music-src" src="" type="audio/mpeg"/>
</audio>

<script>
const API = '/api';
let state = null;
let mediaIndex = 0;
let mediaDurations = [];

// ── Fetch & apply state ───────────────────────────────────────────
async function loadState() {
  try {
    const res = await fetch(API + '/display/state');
    state = await res.json();
    applyState();
  } catch(e) {
    console.error('State load failed:', e);
  }
}

function applyState() {
  if (!state) return;
  applyLogo();
  applyMedia();
  applyMessages();
  applyRss();
  applyMusic();
}

// ── Logo ──────────────────────────────────────────────────────────
function applyLogo() {
  const logo = state.settings?.logo_filename;
  const img  = document.getElementById('logo-img');
  const def  = document.getElementById('logo-default');
  if (logo) {
    img.src = '/uploads/' + logo;
    img.style.display = 'block';
    def.style.display = 'none';
    img.onerror = () => { img.style.display='none'; def.style.display='block'; };
  } else {
    img.style.display = 'none';
    def.style.display = 'block';
  }
}

// ── Media ─────────────────────────────────────────────────────────
function applyMedia() {
  const area  = document.getElementById('media-area');
  const empty = document.getElementById('media-empty');
  const media = state.media || [];

  // Remove old slides (keep #media-empty)
  area.querySelectorAll('.media-slide').forEach(el => el.remove());

  if (!media.length) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  mediaDurations = media.map(m => (m.duration || 10) * 1000);

  media.forEach((m, i) => {
    const slide = document.createElement('div');
    slide.className = 'media-slide' + (i===0?' active':'');
    slide.id = 'slide-' + i;
    if (/\.(mp4|webm)$/i.test(m.filename)) {
      const v = document.createElement('video');
      v.src = m.url; v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true;
      slide.appendChild(v);
    } else {
      const img = document.createElement('img');
      img.src = m.url; img.alt = m.title || '';
      img.loading = 'eager';
      slide.appendChild(img);
    }
    area.appendChild(slide);
  });

  mediaIndex = 0;
  scheduleNextSlide();
}

let slideTimer = null;
function scheduleNextSlide() {
  clearTimeout(slideTimer);
  const slides = document.querySelectorAll('.media-slide');
  if (slides.length <= 1) return;
  const dur = mediaDurations[mediaIndex] || 10000;
  slideTimer = setTimeout(() => {
    slides[mediaIndex].classList.remove('active');
    mediaIndex = (mediaIndex + 1) % slides.length;
    slides[mediaIndex].classList.add('active');
    scheduleNextSlide();
  }, dur);
}

// ── Messages ──────────────────────────────────────────────────────
function applyMessages() {
  const panel = document.getElementById('messages-panel');
  const track = document.getElementById('messages-track');
  const msgs  = (state.messages || []).filter(m => m.active);

  if (!msgs.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  track.innerHTML = '';

  // Duplicate for seamless loop
  const all = [...msgs, ...msgs];
  all.forEach(m => {
    const el = document.createElement('div');
    el.className = 'message-item';
    el.style.color = m.color || '#fff';
    el.style.fontSize = (m.font_size || 28) + 'px';
    el.textContent = m.text;
    track.appendChild(el);
  });

  // Set animation duration (approx based on count)
  const dur = Math.max(20, msgs.length * 8);
  track.style.setProperty('--scroll-dur', dur + 's');
  track.style.animationDuration = dur + 's';
}

// ── RSS ───────────────────────────────────────────────────────────
function applyRss() {
  const bar     = document.getElementById('ticker-bar');
  const track   = document.getElementById('ticker-track');
  const rss     = state.rss;

  if (!rss?.enabled || !rss?.items?.length) { bar.style.display='none'; return; }
  bar.style.display = 'flex';

  const items = rss.items;
  // Duplicate for seamless scroll
  const all = [...items, ...items];
  track.innerHTML = all.map(text =>
    `<span class="ticker-item">${escHtml(text)}</span><span class="ticker-dot">●</span>`
  ).join('');

  // Duration based on total text length
  const total = items.join(' ● ').length;
  const speed = rss.speed || 60; // chars per second
  const dur   = Math.max(30, total / speed * 2);
  track.style.animationDuration = dur + 's';
}

// ── Music ─────────────────────────────────────────────────────────
function applyMusic() {
  const player = document.getElementById('music-player');
  const src    = document.getElementById('music-src');
  const music  = state.music;

  if (!music?.enabled || !music?.url) {
    player.pause();
    return;
  }
  player.volume = (music.volume || 30) / 100;
  if (src.src !== music.url) {
    src.src = music.url;
    player.load();
  }
  player.play().catch(() => {
    // Autoplay blocked — retry on user gesture
    document.addEventListener('click', () => player.play(), { once: true });
  });
}

// ── Clock ─────────────────────────────────────────────────────────
const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

function updateClock() {
  const now = new Date();
  const hh  = String(now.getHours()).padStart(2,'0');
  const mm  = String(now.getMinutes()).padStart(2,'0');
  const ss  = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').childNodes[0].nodeValue = hh + ':' + mm;
  document.getElementById('clock-seconds').textContent = ':' + ss;
  document.getElementById('clock-day').textContent = 'יום ' + DAYS[now.getDay()];
  document.getElementById('clock-date').textContent =
    String(now.getDate()).padStart(2,'0') + '/' +
    String(now.getMonth()+1).padStart(2,'0') + '/' +
    now.getFullYear();
}

function updateHebrew() {
  // Fetch from server (server has @hebcal/core)
  fetch(API + '/display/state')
    .then(r => r.json())
    .then(s => {
      const el = document.getElementById('clock-hebrew');
      if (s.clock?.hebrew) el.textContent = s.clock.hebrew;
    })
    .catch(() => {});
}

// ── SSE — real-time updates ──────────────────────────────────────
function connectSSE() {
  const evts = new EventSource(API + '/events');
  evts.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'update') loadState();
  };
  evts.onerror = () => setTimeout(connectSSE, 5000);
}

// ── Utils ─────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──────────────────────────────────────────────────────────
updateClock();
setInterval(updateClock, 1000);
setInterval(updateHebrew, 60000);

loadState();
setInterval(loadState, 5 * 60 * 1000); // re-fetch every 5 min
connectSSE();
updateHebrew();

// Prevent screen from going dark (page-visibility keep-alive)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) loadState();
});
</script>
</body>
</html>
