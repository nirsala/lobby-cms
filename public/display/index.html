<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1920"/>
<title>Pixel Lobby Display</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#d71d43;
  --dark:#080810;
  --navy:#0d1117;
  --panel:#111827;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --muted:rgba(255,255,255,0.45);
  --muted2:rgba(255,255,255,0.25);
  --text:#ffffff;
  --blue:#1e40af;
  --blue-light:#3b82f6;
}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--dark);color:var(--text);
  font-family:'Heebo','Arial',sans-serif;
  user-select:none;
}

/* ── MAIN SHELL ─── */
#display{display:flex;flex-direction:column;width:100vw;height:100vh;}
#main-row{display:flex;flex:1;overflow:hidden;}

/* ── HEADER BAR ─── */
#header-bar{
  height:68px;flex-shrink:0;
  background:linear-gradient(135deg,#0f172a 0%,#1a1035 40%,#0f172a 100%);
  border-bottom:2px solid var(--red);
  display:flex;align-items:center;
  padding:0 28px;gap:20px;
  position:relative;overflow:hidden;
}
#header-bar::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(215,29,67,0.08),transparent 70%);
  pointer-events:none;
}
#header-logo-wrap{
  flex-shrink:0;height:46px;
  display:flex;align-items:center;
}
#header-logo-wrap img{height:46px;max-width:120px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(215,29,67,0.3));}
#header-sep{width:1px;height:36px;background:rgba(255,255,255,0.15);flex-shrink:0;}
#header-title-block{flex:1;text-align:center;}
#header-welcome{
  font-size:1.05rem;font-weight:500;
  color:rgba(255,255,255,0.6);letter-spacing:1px;
}
#header-building{
  font-size:1.55rem;font-weight:900;
  color:var(--text);letter-spacing:-0.5px;line-height:1.15;
}
#header-addr{
  flex-shrink:0;
  font-size:.8rem;color:var(--muted);
  display:flex;align-items:center;gap:5px;
}
#header-addr svg{color:var(--red);flex-shrink:0;}

/* ── LEFT COLUMN ─── */
#left-col{
  width:250px;flex-shrink:0;
  background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
}
#left-col::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,var(--red),transparent);
  opacity:.3;
}

/* Clock section */
#clock-section{
  padding:20px 16px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#clock-time{
  font-size:3.2rem;font-weight:900;letter-spacing:-2px;line-height:1;
  font-variant-numeric:tabular-nums;
}
#clock-meta{margin-top:6px;}
#clock-day{font-size:.8rem;color:var(--muted);font-weight:500;}
#clock-date{font-size:1rem;font-weight:700;margin-top:2px;}
#clock-hebrew{
  font-size:.9rem;color:var(--red);font-weight:600;margin-top:6px;
}

/* Address at bottom of left col */
#left-address{
  padding:10px 16px;
  border-top:1px solid var(--border);
  flex-shrink:0;display:none;
}
#left-address-label{font-size:.68rem;color:var(--red);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
#left-address-text{font-size:.78rem;color:var(--muted);line-height:1.4;}

/* ── CENTER MEDIA ─── */
#media-area{
  flex:1;position:relative;overflow:hidden;background:#000;
}
.media-slide{
  position:absolute;inset:0;opacity:0;
  transition:opacity 1.2s ease-in-out;
  display:flex;align-items:center;justify-content:center;
}
.media-slide.active{opacity:1;}
.media-slide img,.media-slide video{width:100%;height:100%;object-fit:cover;}
#media-empty{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  background:linear-gradient(135deg,#080810,#111827);
  color:var(--muted);
}
#media-empty svg{opacity:.25;}
#media-empty p{font-size:1rem;letter-spacing:2px;text-transform:uppercase;}

/* ── MESSAGES (left column) ─── */
#msgs-header{
  padding:10px 16px;
  font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--red);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  background:rgba(215,29,67,0.05);
}
#msgs-scroll-wrap{
  flex:1;overflow:hidden;position:relative;
  mask:linear-gradient(to bottom,transparent 0%,black 12%,black 88%,transparent 100%);
}
#msgs-track{
  display:flex;flex-direction:column;gap:12px;
  padding:16px 12px;
}
@keyframes msgsScroll{
  from{transform:translateY(0)}
  to  {transform:translateY(-50%)}
}
.msg-bubble{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-right:3px solid var(--red);
  border-radius:0 12px 12px 0;
  padding:12px 14px;
  flex-shrink:0;
}
.msg-bubble-text{
  font-size:.88rem;font-weight:600;line-height:1.5;
  color:rgba(255,255,255,0.9);
  word-break:break-word;
}
.msg-bubble-footer{
  margin-top:6px;
  display:flex;align-items:center;gap:6px;
}
.msg-bubble-time{font-size:.68rem;color:var(--muted2);}
#msgs-empty{
  padding:24px 16px;text-align:center;
  color:var(--muted);font-size:.85rem;
}

/* ── RSS TICKER ─── */
#ticker-bar{
  height:52px;flex-shrink:0;
  background:rgba(0,0,0,0.9);
  border-top:1px solid rgba(215,29,67,0.25);
  display:flex;align-items:center;overflow:hidden;
}
#ticker-label{
  padding:0 16px;
  font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--red);white-space:nowrap;flex-shrink:0;
  border-left:1px solid rgba(215,29,67,0.3);
  height:100%;display:flex;align-items:center;
  background:rgba(215,29,67,0.06);
  min-width:80px;
}
#ticker-track-wrap{flex:1;overflow:hidden;}
#ticker-track{
  display:inline-flex;gap:80px;white-space:nowrap;
  direction:ltr;
  animation:tickerScroll linear infinite;
  animation-duration:var(--ticker-dur,60s);
}
@keyframes tickerScroll{
  from{transform:translateX(-50%)}
  to  {transform:translateX(0)}
}
.ticker-item{font-size:.88rem;color:rgba(255,255,255,.8);padding:0 8px;}
.ticker-dot{color:var(--red);margin:0 10px;font-size:1rem;vertical-align:middle;}
</style>
</head>
<body>
<div id="display">

  <!-- HEADER BAR -->
  <div id="header-bar">
    <div id="header-logo-wrap">
      <picture>
        <source srcset="/assets/pixel-logo.webp" type="image/webp"/>
        <img src="/assets/pixel-logo.png" alt="Pixel by Keshet" id="header-logo-img"/>
      </picture>
    </div>
    <div id="header-sep"></div>
    <div id="header-title-block">
      <div id="header-welcome">ברוכים הבאים</div>
      <div id="header-building">לובי הבניין</div>
    </div>
    <div id="header-addr" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="header-addr-text"></span>
    </div>
  </div>

  <!-- MAIN ROW -->
  <div id="main-row">

    <!-- LEFT COLUMN -->
    <div id="left-col">
      <div id="clock-section">
        <div id="clock-time">00:00</div>
        <div id="clock-meta">
          <div id="clock-day">טוען...</div>
          <div id="clock-date">--/--/----</div>
          <div id="clock-hebrew"></div>
        </div>
      </div>

      <div id="msgs-section" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div id="msgs-header">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          הודעות לדיירים
        </div>
        <div id="msgs-scroll-wrap">
          <div id="msgs-track">
            <div id="msgs-empty">אין הודעות כרגע</div>
          </div>
        </div>
      </div>

      <div id="left-address">
        <div id="left-address-label">📍 כתובת</div>
        <div id="left-address-text"></div>
      </div>
    </div>

    <!-- CENTER MEDIA -->
    <div id="media-area">
      <div id="media-empty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>ממתין לתכנים...</p>
      </div>
    </div>


  </div>

  <!-- RSS TICKER -->
  <div id="ticker-bar" style="display:none">
    <div id="ticker-label">📰 חדשות</div>
    <div id="ticker-track-wrap">
      <div id="ticker-track"></div>
    </div>
  </div>

</div>

<!-- Hidden audio -->
<audio id="music-player" loop style="display:none">
  <source id="music-src" src="" type="audio/mpeg"/>
</audio>

<script>
const API = '/api';
const USERNAME = new URLSearchParams(window.location.search).get('user') || '';
let state = null;
let mediaIndex = 0;
let mediaDurations = [];

async function loadState() {
  try {
    const res = await fetch(API + '/display/state?user=' + encodeURIComponent(USERNAME));
    state = await res.json();
    applyState();
  } catch(e) { console.error('State load failed:', e); }
}

function applyState() {
  if (!state) return;
  applyHeader();
  applyMedia();
  applyMessages();
  applyRss();
  applyMusic();
}

// ── Header ────────────────────────────────────────────────────────
function applyHeader() {
  const s = state.settings || {};
  const title = s.display_title || 'לובי הבניין';
  const addr  = s.building_address || '';

  document.getElementById('header-building').textContent = title;

  const addrEl  = document.getElementById('header-addr');
  const addrTxt = document.getElementById('header-addr-text');
  if (addr) {
    addrTxt.textContent = addr;
    addrEl.style.display = 'flex';
    // Also show in left col
    document.getElementById('left-address').style.display = 'block';
    document.getElementById('left-address-text').textContent = addr;
  } else {
    addrEl.style.display = 'none';
    document.getElementById('left-address').style.display = 'none';
  }
}

// ── Media ─────────────────────────────────────────────────────────
function applyMedia() {
  const area  = document.getElementById('media-area');
  const empty = document.getElementById('media-empty');
  const media = state.media || [];

  area.querySelectorAll('.media-slide').forEach(el => el.remove());

  if (!media.length) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  mediaDurations = media.map(m => (m.duration || 10) * 1000);
  media.forEach((m, i) => {
    const slide = document.createElement('div');
    slide.className = 'media-slide' + (i===0?' active':'');
    slide.id = 'slide-' + i;
    if (/\.(mp4|webm)$/i.test(m.filename)) {
      const v = document.createElement('video');
      v.src = m.url; v.autoplay=true; v.loop=true; v.muted=true; v.playsInline=true;
      slide.appendChild(v);
    } else {
      const img = document.createElement('img');
      img.src = m.url; img.alt = m.title||''; img.loading='eager';
      slide.appendChild(img);
    }
    area.appendChild(slide);
  });
  mediaIndex = 0;
  scheduleNextSlide();
}

let slideTimer = null;
function scheduleNextSlide() {
  clearTimeout(slideTimer);
  const slides = document.querySelectorAll('.media-slide');
  if (slides.length <= 1) return;
  const dur = mediaDurations[mediaIndex] || 10000;
  slideTimer = setTimeout(() => {
    slides[mediaIndex].classList.remove('active');
    mediaIndex = (mediaIndex + 1) % slides.length;
    slides[mediaIndex].classList.add('active');
    scheduleNextSlide();
  }, dur);
}

// ── Messages ──────────────────────────────────────────────────────
function applyMessages() {
  const wrap  = document.getElementById('msgs-scroll-wrap');
  const track = document.getElementById('msgs-track');
  const msgs  = (state.messages || []).filter(m => m.active);

  function makeBubbles(arr) {
    return arr.map(m => {
      const time = m.created_at
        ? new Date(m.created_at).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})
        : '';
      return `<div class="msg-bubble">
        <div class="msg-bubble-text" style="color:${m.color||'#fff'};font-size:${m.font_size||22}px">${escHtml(m.text)}</div>
        ${time ? `<div class="msg-bubble-footer"><span class="msg-bubble-time">${time}</span></div>` : ''}
      </div>`;
    }).join('');
  }

  if (!msgs.length) {
    track.innerHTML = '<div id="msgs-empty" style="padding:24px 16px;text-align:center;color:var(--muted);font-size:.85rem;">אין הודעות כרגע</div>';
    track.style.animation = 'none';
    return;
  }

  const dur = state.message_speed || Math.max(20, msgs.length * 8);

  // Render single set first, pause animation while measuring
  track.innerHTML = makeBubbles(msgs);
  track.style.animation = 'none';

  // Two rAF frames ensure layout is fully computed before we measure
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const trackH = track.scrollHeight;
    const wrapH  = wrap.clientHeight;
    if (trackH > wrapH * 0.85) {
      // Content taller than visible area — duplicate for seamless infinite scroll
      track.innerHTML = makeBubbles([...msgs, ...msgs]);
      track.style.animation = 'none';
      track.offsetHeight; // force reflow so animation restarts cleanly
      track.style.animation = `msgsScroll ${dur}s linear infinite`;
    }
    // else: everything fits in view — display statically, no scroll
  }));
}

// ── RSS ───────────────────────────────────────────────────────────
function applyRss() {
  const bar   = document.getElementById('ticker-bar');
  const track = document.getElementById('ticker-track');
  const rss   = state.rss;

  if (!rss?.enabled || !rss?.items?.length) {
    bar.style.display = 'none';
    return;
  }

  bar.style.display = 'flex';
  const all = [...rss.items, ...rss.items];
  track.innerHTML = all.map(text =>
    `<span class="ticker-item">${escHtml(text)}</span><span class="ticker-dot">●</span>`
  ).join('');
  const total = rss.items.join(' ● ').length;
  const speed = rss.speed || 30;
  const dur   = Math.max(30, total / speed * 2);
  // Force animation restart so it always runs after content update
  track.style.animation = 'none';
  track.offsetHeight; // trigger reflow
  track.style.animation = `tickerScroll ${dur}s linear infinite`;
}

// ── Music ─────────────────────────────────────────────────────────
function applyMusic() {
  const player = document.getElementById('music-player');
  const src    = document.getElementById('music-src');
  const music  = state.music;

  if (!music?.enabled || !music?.files?.length) { player.pause(); return; }

  const vol  = (music.volume || 30) / 100;
  const urls = music.files.map(f => f.url);
  let currentIdx = 0;

  function playIdx(i) {
    currentIdx = ((i % urls.length) + urls.length) % urls.length;
    src.src = urls[currentIdx];
    player.load();
    // Set volume after load — browsers may reset it on load()
    player.addEventListener('canplay', function onCanPlay() {
      player.removeEventListener('canplay', onCanPlay);
      player.volume = vol;
      player.play().catch(() => {
        document.addEventListener('click', () => { player.volume = vol; player.play(); }, { once: true });
      });
    });
  }

  const newList = urls.join(',');
  if (player.dataset.playlist !== newList) {
    player.dataset.playlist = newList;
    player.onended = () => playIdx(currentIdx + 1);
    playIdx(0);
  } else {
    // Playlist unchanged — just update volume live
    player.volume = vol;
  }
}

// ── Clock ─────────────────────────────────────────────────────────
const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
function updateClock() {
  const now = new Date();
  const hh  = String(now.getHours()).padStart(2,'0');
  const mm  = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-time').textContent = hh + ':' + mm;
  document.getElementById('clock-day').textContent = 'יום ' + DAYS[now.getDay()];
  document.getElementById('clock-date').textContent =
    String(now.getDate()).padStart(2,'0') + '/' +
    String(now.getMonth()+1).padStart(2,'0') + '/' +
    now.getFullYear();
}

function updateHebrew() {
  fetch(API + '/display/state?user=' + encodeURIComponent(USERNAME))
    .then(r => r.json())
    .then(s => {
      const el = document.getElementById('clock-hebrew');
      if (s.clock?.hebrew) el.textContent = s.clock.hebrew;
    })
    .catch(() => {});
}

// ── SSE ───────────────────────────────────────────────────────────
function connectSSE() {
  const evts = new EventSource(API + '/events?user=' + encodeURIComponent(USERNAME));
  evts.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'update') loadState();
  };
  evts.onerror = () => setTimeout(connectSSE, 5000);
}

// ── Utils ─────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ─────────────────────────────────────────────────────────
updateClock();
setInterval(updateClock, 1000);
setInterval(updateHebrew, 60000);
loadState();
setInterval(loadState, 5 * 60 * 1000);
connectSSE();
updateHebrew();
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) loadState();
});
</script>
</body>
</html>
