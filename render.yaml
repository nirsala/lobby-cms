services:
  - type: web
    name: lobby-cms
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: XIBO_URL
        value: https://ds.xvision.co.il
      - key: XIBO_CLIENT_ID
        sync: false
      - key: XIBO_CLIENT_SECRET
        sync: false
    disk:
      name: lobby-data
      mountPath: /data
      sizeGB: 1
