services:
  - type: web
    name: lobby-cms
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: UPLOAD_DIR
        value: /data/uploads
    disk:
      name: lobby-data
      mountPath: /data
      sizeGB: 1
